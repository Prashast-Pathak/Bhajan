<script>
function toggleMobileMenu() {
  const menu = document.getElementById('mobileMenu');
  const overlay = document.getElementById('mobileMenuOverlay');
  if(menu.classList.contains('active')) {
    menu.classList.remove('active');
    overlay.classList.remove('active');
  } else {
    menu.classList.add('active');
    overlay.classList.add('active');
  }
}
</script>

<script>
// ── UI TOGGLES (consolidated) ──
(function() {
  // Apply initial states immediately to prevent flash
  const isDark = localStorage.getItem('sgs_dark') === 'true';
  if (isDark) document.body.classList.add('dark-mode');

  const isChanting = localStorage.getItem('sgs_chanting_mode') === 'true';
  if (isChanting) document.body.classList.add('chanting-mode');

  let fontSize = parseInt(localStorage.getItem('sgs_fontsize') || '22');
  document.documentElement.style.setProperty('--font-size-hindi', fontSize + 'px');
  document.documentElement.style.setProperty('--hindi-size', fontSize + 'px');

  document.addEventListener('DOMContentLoaded', () => {
    // Dark Mode Toggle
    const darkBtn = document.getElementById('darkToggle');
    if (darkBtn) {
      darkBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('sgs_dark', document.body.classList.contains('dark-mode'));
      });
    }

    // Font Size Toggle (optional)
    const fontBtn = document.getElementById('fontToggle');
    if (fontBtn) {
      fontBtn.addEventListener('click', () => {
        fontSize += 2;
        if (fontSize > 36) fontSize = 18;
        document.documentElement.style.setProperty('--font-size-hindi', fontSize + 'px');
        document.documentElement.style.setProperty('--hindi-size', fontSize + 'px');
        localStorage.setItem('sgs_fontsize', fontSize);
      });
    }

    // Chanting Toggle (optional)
    const chantBtn = document.getElementById('chantingToggle');
    if (chantBtn) {
      function updateChantBtn() {
        const on = document.body.classList.contains('chanting-mode');
        chantBtn.innerHTML = on ? '📖 Study' : '🎵 Chant';
        chantBtn.title = on ? 'Switch to Study Mode' : 'Switch to Chanting Mode';
      }
      updateChantBtn();
      chantBtn.addEventListener('click', () => {
        document.body.classList.toggle('chanting-mode');
        localStorage.setItem('sgs_chanting_mode', document.body.classList.contains('chanting-mode'));
        updateChantBtn();
      });
    }
  });
})();
</script>

let currentView = 'verse'; // 'verse' | 'chapter' | 'browse'

// Persist user preferences
let scriptPref = localStorage.getItem('script_preference') || 'both';
let fontPref = localStorage.getItem('font_size_pref') || 'normal';

applyPrefs();

function applyPrefs() {
  // font
  document.body.className = document.body.className
    .replace(/fs-\w+/, '')
    .trim();
  document.body.classList.add('fs-' + fontPref);
  // script
  document.body.classList.remove('script-devanagari', 'script-roman', 'script-both');
  document.body.classList.add('script-' + scriptPref);
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
window.addEventListener('DOMContentLoaded', init);

async function init() {
  try {
    const res = await fetch('/data/gita.json');
    if (!res.ok) throw new Error('Network error');
    gitaData = await res.json();
    buildSearchIndex();
    routePage();
  } catch(e) {
    showError();
  }
}

function routePage() {
  const params = new URLSearchParams(window.location.search);
  const chapter = params.get('chapter');
  const verse = params.get('verse');
  const chapterOnly = params.get('chapter') && !params.get('verse');

  if (chapter && verse) {
    const ch = gitaData.chapters.find(c => c.chapter == chapter);
    if (!ch) { show404(); return; }
    const v = ch.verses.find(v => v.verse == verse);
    if (!v) { show404(); return; }
    currentChapter = ch;
    currentVerse = v;
    currentView = 'verse';
    renderVersePage(ch, v);
  } else if (chapter && !verse) {
    const ch = gitaData.chapters.find(c => c.chapter == chapter);
    if (!ch) { show404(); return; }
    currentChapter = ch;
    currentView = 'chapter';
    renderChapterPage(ch);
  } else {
    currentView = 'browse';
    renderBrowsePage();
  }
}

function updateSEO(title, desc, keywords) {
  document.title = title + ' | Sanatan Gyan Sagar';
  document.getElementById('meta-desc').content = desc;
  document.getElementById('og-title').content = title;
  document.getElementById('og-desc').content = desc;
  const canonical = window.location.href;
  document.getElementById('canonical').href = canonical;

  // JSON-LD
  const ld = {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": title,
    "description": desc,
    "author": { "@type": "Organization", "name": "Sanatan Gyan Sagar" },
    "inLanguage": ["hi", "sa", "en"],
    "keywords": Array.isArray(keywords) ? keywords.join(', ') : keywords
  };
  document.getElementById('json-ld').textContent = JSON.stringify(ld);
}

// ═══════════════════════════════════════════
//  TOGGLE CONTROLS
// ═══════════════════════════════════════════
function setScript(pref) {
  scriptPref = pref;
  localStorage.setItem('script_preference', pref);
  applyPrefs();
  // Update button states
  document.querySelectorAll('[onclick*="setScript"]').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${pref}'`));
  });
}

function setFont(pref) {
  fontPref = pref;
  localStorage.setItem('font_size_pref', pref);
  applyPrefs();
  document.querySelectorAll('[onclick*="setFont"]').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${pref}'`));
  });
}

// ═══════════════════════════════════════════
//  FAVORITES
// ═══════════════════════════════════════════
function getFavorites() {
  try {
    return JSON.parse(localStorage.getItem('sgyan_favorites') || '{}');
  } catch { return {}; }
}
function saveFavorites(f) {
  localStorage.setItem('sgyan_favorites', JSON.stringify(f));
}

function toggleFavorite() {
  if (!currentVerse) return;
  const favs = getFavorites();
  if (!favs.gita) favs.gita = [];
  const idx = favs.gita.indexOf(currentVerse.slug);
  if (idx === -1) {
    favs.gita.push(currentVerse.slug);
    showToast('❤️ Saved to Favorites!');
    updateFavBtn(true);
  } else {
    favs.gita.splice(idx, 1);
    showToast('Removed from Favorites');
    updateFavBtn(false);
  }
  saveFavorites(favs);
}

function updateFavBtn(saved) {
  const btn = document.getElementById('fav-btn');
  if (!btn) return;
  btn.classList.toggle('saved', saved);
  btn.innerHTML = saved ? '❤️ Saved' : '❤️ Save';
}

// ═══════════════════════════════════════════
//  SHARE + COPY
// ═══════════════════════════════════════════
function shareWhatsApp() {
  if (!currentVerse || !currentChapter) return;
  const v = currentVerse;
  const msg = `🙏 *Bhagavad Gita — Chapter ${currentChapter.chapter}, Verse ${v.verse}*\n\n` +
    `${v.sanskrit}\n\n` +
    `*अर्थ:* ${v.hindi_translation}\n\n` +
    `*Meaning:* ${v.english_translation}\n\n` +
    `पूरी व्याख्या 👇\n${window.location.href}\n\n📿 सनातन ज्ञान सागर`;
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}

function copyVerse() {
  if (!currentVerse || !currentChapter) return;
  const v = currentVerse;
  const text = `Bhagavad Gita — Chapter ${currentChapter.chapter}, Verse ${v.verse}\n\n` +
    `Sanskrit:\n${v.sanskrit}\n\n` +
    `Hindi: ${v.hindi_translation}\n\n` +
    `English: ${v.english_translation}\n\n` +
    `Source: ${window.location.href}`;
  navigator.clipboard.writeText(text).then(() => showToast('📋 Copied!'));
}

// ═══════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════
function buildSearchIndex() {
  if (!gitaData) return;
  const items = gitaData.chapters.flatMap(ch =>
    ch.verses.map(v => ({
      id: v.slug,
      title: `Ch ${ch.chapter}, V ${v.verse}`,
      subtitle: v.english_translation,
      hindi: v.hindi_translation,
      topics: (v.topics || []).join(' '),
      chapter: ch.chapter,
      verse: v.verse,
      url: `/bhagavad-gita.html?chapter=${ch.chapter}&verse=${v.verse}`
    }))
  );
  fuseSearch = new Fuse(items, {
    threshold: 0.4,
    keys: [
      { name: 'subtitle', weight: 2 },
      { name: 'hindi', weight: 2 },
      { name: 'topics', weight: 3 },
      { name: 'title', weight: 1 }
    ]
  });
}

function handleSearch(q) {
  const el = document.getElementById('search-results');
  if (!q || q.length < 2 || !fuseSearch) { el.classList.add('hidden'); return; }
  const results = fuseSearch.search(q).slice(0, 8);
  if (!results.length) { el.classList.add('hidden'); return; }
  el.innerHTML = results.map(r => `
    <a href="/${r.item.url}" style="display:block;padding:10px 14px;border-bottom:1px solid var(--border);text-decoration:none;color:var(--text);"
       onmouseover="this.style.background='var(--surface)'" onmouseout="this.style.background=''"
       onclick="document.getElementById('search-bar').classList.add('hidden');">
      <div class="flex gap-2 items-center">
        <span class="gita-badge">Ch ${r.item.chapter}, V ${r.item.verse}</span>
      </div>
      <div style="font-size:13px;color:var(--text-muted);margin-top:2px;">${r.item.subtitle.substring(0,80)}...</div>
    </a>`).join('');
  el.classList.remove('hidden');
}

function toggleSearch() {
  const bar = document.getElementById('search-bar');
  bar.classList.toggle('hidden');
  if (!bar.classList.contains('hidden')) {
    document.getElementById('search-input').focus();
  }
}

// ═══════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
